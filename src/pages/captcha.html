<!DOCTYPE html>
<html>
<head>
    <title>Form with reCAPTCHA</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="submit1.php" method="post">
        <!-- Field 1: Name -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <!-- Field 2: Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <!-- Field 3: Message -->
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4"></textarea><br><br>

        <!-- Field 4: Subject -->
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject"><br><br>

        <input type='hidden' name="amount" value="123">
        <input type='hidden' name="crn" value="333333333333">
        <input type="hidden" name="api_key" value="NTliOTkxNTAyNTkxZmRjZWJkYWJhOWZi">

        <!-- Google reCAPTCHA -->
        <div class="g-recaptcha" data-sitekey="6LedTJkoAAAAACcu14GOvs2Usq-7y7yfeDSzUUNo"></div><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">
    </form>
</body>
</html>
